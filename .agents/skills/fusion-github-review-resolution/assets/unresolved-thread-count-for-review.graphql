query UnresolvedThreadCountForReview($owner: String!, $repo: String!, $number: Int!) {
  repository(owner: $owner, name: $repo) {
    pullRequest(number: $number) {
      reviewThreads(first: 100) {
        nodes {
          id
          isResolved
          comments(first: 1) {
            nodes {
              pullRequestReview {
                databaseId
              }
            }
          }
        }
      }
    }
  }
}
