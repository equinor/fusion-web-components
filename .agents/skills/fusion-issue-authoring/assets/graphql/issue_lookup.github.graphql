query IssueLookup($owner: String!, $repo: String!, $number: Int!) {
  repository(owner: $owner, name: $repo) {
    issue(number: $number) {
      id
      number
      url
      title
      issueType {
        id
        name
      }
      parent {
        id
        number
      }
      labels(first: 100) {
        nodes {
          name
        }
      }
    }
  }
}
