query LinkageVerify($owner: String!, $repo: String!, $parentNumber: Int!, $childNumber: Int!) {
  repository(owner: $owner, name: $repo) {
    parent: issue(number: $parentNumber) {
      id
      number
      title
    }
    child: issue(number: $childNumber) {
      id
      number
      title
      issueType {
        id
        name
      }
      parent {
        id
        number
      }
    }
  }
}
